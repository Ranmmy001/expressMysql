<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Names Manager</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>

    <div class="container">

        <h1>Names Manager</h1>

        <!-- Add Name -->
        <div class="card">
            <h2>Add Name</h2>
            <div class="form-group">
                <input type="text" id="name-input" placeholder="Enter name">
                <button id="add-name-btn">Add</button>
            </div>
        </div>

        <!-- Search -->
        <div class="card">
            <h2>Search</h2>
            <div class="form-group">
                <input type="text" id="search-input" placeholder="Search by name">
                <button id="search-btn" class="secondary">Search</button>
            </div>
        </div>

        <!-- Table -->
        <div class="card">
            <h2>All Names</h2>

            <table id="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Date Added</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Update -->
        <div class="card hidden" id="update-row">
            <h2>Update Name</h2>
            <div class="form-group">
                <input type="text" id="update-name-input">
                <button id="update-row-btn">Update</button>
            </div>
        </div>

    </div>
    <script src="config.js"></script>
    <script src="index.js"></script>
</body>

</html>
